name: Weekly Minecraft Trend Report

on:
  # GitHub純正のscheduleトリガーはベストエフォートで、高負荷時に起動がスキップされることが
  # 公式に明記されているため、外部cronサービス(cron-job.org等)からこのworkflow_dispatchを
  # 呼び出す方式に変更した。scheduleトリガーは意図的に設定していない。
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
      - run: npm start
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          TEAMS_POST_MODE: powerAutomate
          MAX_RESULTS_PER_QUERY: 25
          TARGET_DAYS: 30
          SHAREPOINT_ENABLED: "true"
          SHAREPOINT_TENANT_ID: ${{ secrets.SHAREPOINT_TENANT_ID }}
          SHAREPOINT_CLIENT_ID: ${{ secrets.SHAREPOINT_CLIENT_ID }}
          SHAREPOINT_CLIENT_SECRET: ${{ secrets.SHAREPOINT_CLIENT_SECRET }}
          SHAREPOINT_SITE_HOSTNAME: ${{ secrets.SHAREPOINT_SITE_HOSTNAME }}
          SHAREPOINT_SITE_PATH: ${{ secrets.SHAREPOINT_SITE_PATH }}
          SHAREPOINT_LIST_NAME: MinecraftTrendHistory
          SHAREPOINT_SAVE_TOP_N: 30
          SHAREPOINT_DASHBOARD_URL: ${{ secrets.SHAREPOINT_DASHBOARD_URL }}
          SUPABASE_ENABLED: "true"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_TABLE_NAME: minecraft_trend_history
          SUPABASE_SAVE_TOP_N: 30
      - name: Commit updated data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update weekly minecraft trend data"
          git push
