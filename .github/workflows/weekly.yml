name: Weekly Minecraft Trend Report

on:
  schedule:
    # [検証用一時設定・2回目] UTC 2026-07-14 07:56 (JST 16:56) に本当にcronで起動するか確認するためのテスト
    # 1回目(07:06)はプッシュから15分しか猶予がなく、GitHub側のcron登録が間に合わなかった可能性があるため、
    # 今回は40分の余裕を取っている。
    # 本来のスケジュール(日本時間 毎週金曜6:40 = UTC 毎週木曜21:40): "40 21 * * 4"
    - cron: "56 7 * * 2"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
      - run: npm start
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          TEAMS_POST_MODE: powerAutomate
          MAX_RESULTS_PER_QUERY: 25
          TARGET_DAYS: 30
          SHAREPOINT_ENABLED: "true"
          SHAREPOINT_TENANT_ID: ${{ secrets.SHAREPOINT_TENANT_ID }}
          SHAREPOINT_CLIENT_ID: ${{ secrets.SHAREPOINT_CLIENT_ID }}
          SHAREPOINT_CLIENT_SECRET: ${{ secrets.SHAREPOINT_CLIENT_SECRET }}
          SHAREPOINT_SITE_HOSTNAME: ${{ secrets.SHAREPOINT_SITE_HOSTNAME }}
          SHAREPOINT_SITE_PATH: ${{ secrets.SHAREPOINT_SITE_PATH }}
          SHAREPOINT_LIST_NAME: MinecraftTrendHistory
          SHAREPOINT_SAVE_TOP_N: 30
          SHAREPOINT_DASHBOARD_URL: ${{ secrets.SHAREPOINT_DASHBOARD_URL }}
      - name: Commit updated data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update weekly minecraft trend data"
          git push
